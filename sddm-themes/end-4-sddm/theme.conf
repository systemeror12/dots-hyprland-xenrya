[General]
# Display metadata
displayName=end-4-sddm
themeName=end-4-sddm

# Runtime data dir - writable by the sddm group
dataDir=/var/lib/sddm/illogical-impulse/end-4-sddm

# Wallpaper path - updated by update-active-theme.sh
wallpaperPath=assets/default_wallpaper.png

# ============================================================
# HOTSPOT: Layout geometry
# Modify these values to tweak the position and size of UI
# elements without touching QML.
# ============================================================

# Clock position (top-left corner)
clockTopMargin=60
clockLeftMargin=300

# Login form position (below the clock)
formTopMargin=40
formLeftMargin=300

# Login form width
formWidth=300

# Height of user/password/session rows
rowHeight=48

# Vertical spacing between rows
rowSpacing=12

# Height of the Login button
buttonHeight=48

# Power button row
powerButtonSize=40
powerButtonSpacing=12

# Session selector button height
sessionButtonHeight=40

# Date/time formats use Qt date-time format syntax.
# Examples: "hh:mm" -> 16:24, "dddd d" -> Friday 8
timeFormat=hh:mm
dateFormat=dddd d

# Optional left-side gradient scrim behind the form for readability.
# Set to true if your wallpaper is bright on the left side.
useLeftScrim=false
scrimColor=#000000
scrimWidth=500

# ============================================================
# HOTSPOT: Material You colors
# These defaults are used when no theme.conf.user is generated.
# In normal use, update-active-theme.sh overwrites these from
# your current wallpaper (colors.json).
#
# Keys are snake_case to match matugen's output directly.
# ============================================================
background=#141313
surface=#141313
surface_container_low=#1c1b1c
surface_container=#201f20
surface_container_high=#2b2a2a
surface_container_highest=#363435
primary=#cbc4cb
on_primary=#322f34
primary_container=#2d2a2f
on_primary_container=#bcb6bc
secondary=#cac5c8
on_secondary=#323032
secondary_container=#4d4b4d
on_secondary_container=#ece6e9
outline=#948f94
outline_variant=#49464a
on_surface=#e6e1e1
on_surface_variant=#cbc5ca
error=#ffb4ab
on_error=#690005
scrim=#000000

# ============================================================
# HOTSPOT: Fonts
# These must be installed system-wide (install.sh handles the
# common ones). Change these to use a different font family.
# ============================================================
fontFamily=Google Sans Flex
fontFamilyIcons=Material Symbols Rounded
fontFamilyMono=JetBrains Mono NF
